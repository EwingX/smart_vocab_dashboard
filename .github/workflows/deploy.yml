name: Deploy to HuggingFace Space

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://EwingX2979:${HF_TOKEN}@huggingface.co/spaces/EwingX2979/smart-vocab
          git push space main
