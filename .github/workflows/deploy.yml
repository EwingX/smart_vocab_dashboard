name: Deploy to HuggingFace Space

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python -c "
          from huggingface_hub import HfApi
          api = HfApi(token='$HF_TOKEN')
          api.upload_folder(
              folder_path='.',
              repo_id='EwingX2979/smart-vocab',
              repo_type='space',
              ignore_patterns=['.git', '.github', '__pycache__', '.env', '.gitignore', 'Procfile', '*.pyc', '.claude']
          )
          print('Deploy done!')
          "
