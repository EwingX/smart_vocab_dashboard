<!DOCTYPE html>
<html lang="zh-CN" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sync_Vocab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,500;1,600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', '"PingFang SC"', '"Hiragino Sans GB"', '"Microsoft YaHei"', 'sans-serif'],
            serif: ['"Playfair Display"', 'Georgia', '"Times New Roman"', 'serif'],
            mono: ['"JetBrains Mono"', '"Fira Code"', 'Consolas', '"SF Mono"', 'monospace'],
          },
        },
      },
    }
  </script>
  <style>
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .word-text {
      font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
    }

    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    .modal-overlay {
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(12px);
    }
    .dark .modal-overlay { background: rgba(0,0,0,0.55); }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.94) translateY(20px); }
      to   { opacity: 1; transform: scale(1)   translateY(0);    }
    }
    @keyframes modalOut {
      from { opacity: 1; transform: scale(1)   translateY(0);    }
      to   { opacity: 0; transform: scale(0.94) translateY(20px); }
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 9999;
      padding: 0.7rem 1.4rem;
      border-radius: 0.6rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: #fff;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      animation: toastIn 0.35s ease, toastOut 0.35s ease 2.6s forwards;
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .toast-success { background: #059669; }
    .toast-error   { background: #dc2626; }
    .toast-undo     { background: #475569; animation: toastIn 0.35s ease; }

    .toast-undo-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 0.2rem 0.7rem;
      border-radius: 0.35rem;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .toast-undo-btn:hover { background: rgba(255,255,255,0.35); }

    @keyframes toastIn  { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes toastOut { from { opacity:1; transform:translateY(0);   } to { opacity:0; transform:translateY(16px); } }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    .dark ::-webkit-scrollbar-thumb { background: #4b5563; }

    .pos-badge {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.38rem 0.55rem;
      border-radius: 0.45rem;
      font-size: 0.73rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
      border: 1px solid transparent;
      background: transparent;
      color: #64748b;
      flex-shrink: 0;
    }
    .pos-badge:hover { background: #f1f5f9; }
    .dark .pos-badge:hover { background: #1e293b; }
    .pos-badge:active { transform: scale(0.97); }

    .pos-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .pos-dot.pos-all   { background: #94a3b8; }  .dark .pos-dot.pos-all   { background: #64748b; }
    .pos-dot.pos-n     { background: #3b82f6; }  .dark .pos-dot.pos-n     { background: #60a5fa; }
    .pos-dot.pos-v     { background: #10b981; }  .dark .pos-dot.pos-v     { background: #34d399; }
    .pos-dot.pos-adj   { background: #f59e0b; }  .dark .pos-dot.pos-adj   { background: #fbbf24; }
    .pos-dot.pos-adv   { background: #8b5cf6; }  .dark .pos-dot.pos-adv   { background: #a78bfa; }
    .pos-dot.pos-prep  { background: #f43f5e; }  .dark .pos-dot.pos-prep  { background: #fda4af; }
    .pos-dot.pos-conj  { background: #14b8a6; }  .dark .pos-dot.pos-conj  { background: #2dd4bf; }

    .pos-badge.active { background: #f1f5f9; border-color: #e2e8f0; }
    .dark .pos-badge.active { background: #1e293b; border-color: #334155; }
    .pos-badge.active.pos-all   { background: #475569; color: #fff; border-color: #475569; }
    .dark .pos-badge.active.pos-all   { background: #cbd5e1; color: #0f172a; border-color: #cbd5e1; }
    .pos-badge.active.pos-n     { background: #3b82f6; color: #fff; border-color: #3b82f6; }
    .dark .pos-badge.active.pos-n     { background: #60a5fa; color: #0c1929; border-color: #60a5fa; }
    .pos-badge.active.pos-v     { background: #10b981; color: #fff; border-color: #10b981; }
    .dark .pos-badge.active.pos-v     { background: #34d399; color: #022c22; border-color: #34d399; }
    .pos-badge.active.pos-adj   { background: #f59e0b; color: #fff; border-color: #f59e0b; }
    .dark .pos-badge.active.pos-adj   { background: #fbbf24; color: #451a03; border-color: #fbbf24; }
    .pos-badge.active.pos-adv   { background: #8b5cf6; color: #fff; border-color: #8b5cf6; }
    .dark .pos-badge.active.pos-adv   { background: #a78bfa; color: #1e0b4c; border-color: #a78bfa; }
    .pos-badge.active.pos-prep  { background: #f43f5e; color: #fff; border-color: #f43f5e; }
    .dark .pos-badge.active.pos-prep  { background: #fda4af; color: #4c0519; border-color: #fda4af; }
    .pos-badge.active.pos-conj  { background: #14b8a6; color: #fff; border-color: #14b8a6; }
    .dark .pos-badge.active.pos-conj  { background: #2dd4bf; color: #042f2e; border-color: #2dd4bf; }

    .phrase-chip { transition: all 0.25s ease; cursor: pointer; }
    .phrase-chip:hover { transform: translateY(-1px); }
    .phrase-chip.active { background: #475569; color: #fff; }
    .dark .phrase-chip.active { background: #cbd5e1; color: #0f172a; }

    .import-area { max-height: 0; overflow: hidden; transition: max-height 0.35s ease, margin 0.35s ease; }
    .import-area.open { max-height: 300px; }

    /* ================================================================ */
    /*  移动端适配 (max-width: 768px)                                     */
    /* ================================================================ */
    @media (max-width: 768px) {
      /* --- 顶部导航栏按钮：扩大触控热区 (44px+) --- */
      #mobilePosToggle,
      #mobileStatsToggle,
      #themeToggle {
        min-width: 44px;
        min-height: 44px;
        width: 44px;
        height: 44px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      #mobilePosToggle svg,
      #mobileStatsToggle svg,
      #themeToggle svg {
        width: 20px;
        height: 20px;
      }

      /* --- 头部内边距收紧 --- */
      header > div { padding-left: 0.75rem; padding-right: 0.75rem; }

      /* --- 主内容区 --- */
      main { padding-left: 0.75rem; padding-right: 0.75rem; padding-top: 1rem; }

      /* --- 搜索 & 添加单词行 --- */
      #searchInput, #addWordInput {
        font-size: 16px;  /* 防止 iOS 缩放 */
        padding-top: 0.65rem;
        padding-bottom: 0.65rem;
      }
      #addWordBtn {
        padding-left: 0.75rem;
        padding-right: 0.75rem;
        font-size: 0.75rem;
        white-space: nowrap;
      }
      /* 取消输入行的最小/最大宽度限制，防止溢出 */
      #addWordInput + button + button { /* toggleImportBtn */
        min-width: 44px;
        height: 44px;
        padding: 0;
      }
      #addWordInput { min-width: 0; }
      /* 去除生成卡片行的固定宽度限制，避免溢出 */
      main .min-w-\[260px\] { min-width: 0 !important; }
      main .max-w-\[380px\] { max-width: 100% !important; }

      /* --- 卡片网格：单列 --- */
      #cardGrid {
        grid-template-columns: 1fr;
        gap: 0.75rem;
      }

      /* --- 卡片内部微调 --- */
      #cardGrid .h-\[235px\] {
        height: auto;
        min-height: 200px;
      }

      /* --- 移动端左侧词性筛选菜单 --- */
      #leftSidebar.mobile-sidebar-open {
        display: block;
        position: fixed;
        top: 57px;
        left: 0;
        z-index: 50;
        width: 180px;
        max-height: calc(100vh - 57px);
        overflow-y: auto;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
        border-right: 1px solid rgba(0, 0, 0, 0.06);
      }
      .dark #leftSidebar.mobile-sidebar-open {
        background: rgba(20, 20, 27, 0.94);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        border-right: 1px solid rgba(255, 255, 255, 0.06);
      }

      /* --- 移动端右侧记忆统计面板 --- */
      #mobileStatsPanel:not(.hidden) {
        display: block;
        margin-top: 1rem;
        padding: 1rem;
        border-radius: 0.75rem;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .dark #mobileStatsPanel:not(.hidden) {
        background: rgba(20, 20, 27, 0.85);
      }

      /* --- 模态框：移动端全屏 --- */
      #wordModal > .relative {
        width: 100vw;
        max-width: 100vw;
        height: 100vh;
        max-height: 100vh;
        border-radius: 0;
        margin: 0;
      }
      #wordModal .p-8 {
        padding: 1.25rem;
      }
      #modalWord {
        font-size: 1.75rem;
        line-height: 1.2;
      }

      /* --- Toast：移动端底部居中 --- */
      .toast {
        left: 1rem;
        right: 1rem;
        bottom: 1.25rem;
        font-size: 0.8rem;
        padding: 0.6rem 1rem;
        text-align: center;
        justify-content: center;
        border-radius: 0.75rem;
        max-width: calc(100vw - 2rem);
      }

      /* --- 导入区域 --- */
      #importTextarea { font-size: 16px; }

      /* --- 激活筛选标签换行 --- */
      #activeFilters { gap: 0.4rem; }
    }
  </style>
</head>
<body class="min-h-screen bg-[#fafaf9] dark:bg-[#0f0f13] text-gray-800 dark:text-gray-200 antialiased">

  <!-- ================================================================== -->
  <!--  Top Header                                                         -->
  <!-- ================================================================== -->
  <header class="sticky top-0 z-40 border-b border-gray-200/70 dark:border-gray-800/70 bg-white/80 dark:bg-[#0f0f13]/80 backdrop-blur-lg">
    <div class="px-5 py-3 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3 shrink-0">
        <h1 class="text-base font-semibold tracking-tight text-gray-900 dark:text-gray-100">Sync_Vocab</h1>
        <span id="wordCount" class="text-xs text-gray-400 dark:text-gray-500 bg-gray-100 dark:bg-gray-800 px-2 py-0.5 rounded-full">0 词</span>
      </div>
      <div class="flex items-center gap-2">
        <button id="mobilePosToggle" title="分类筛选"
                class="lg:hidden w-8 h-8 flex items-center justify-center rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors text-xs text-gray-500">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 4h18M3 8h12M3 12h18M3 16h12M3 20h18"/></svg>
        </button>
        <button id="mobileStatsToggle" title="记忆统计"
                class="lg:hidden w-8 h-8 flex items-center justify-center rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors text-xs text-gray-500">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        </button>
        <button id="themeToggle"
                class="w-8 h-8 flex items-center justify-center rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors"
                title="切换暗黑/明亮模式" aria-label="切换暗黑模式">
          <svg id="iconSun" class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg id="iconMoon" class="w-4 h-4 text-gray-300 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ================================================================== -->
  <!--  三栏主体布局                                                        -->
  <!-- ================================================================== -->
  <div class="flex flex-col lg:flex-row">

    <!-- ===== 左侧边栏 ===== -->
    <aside id="leftSidebar" class="
      lg:block lg:w-40 lg:flex-shrink-0 lg:sticky lg:top-[57px] lg:max-h-[calc(100vh-57px)] lg:overflow-y-auto lg:border-r lg:border-gray-200/70 dark:lg:border-gray-800/70 lg:bg-white/50 dark:lg:bg-[#0f0f13]/50
      hidden
    ">
      <div class="p-3 space-y-4">
        <section>
          <p class="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-3">Parts of Speech</p>
          <div id="posBadgeGrid" class="flex flex-col gap-1"></div>
        </section>
        <section>
          <p class="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-3">Phrases</p>
          <button id="phraseFilterBtn" class="phrase-chip w-full text-left px-2.5 py-1.5 rounded-lg text-xs font-medium transition-colors
            text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800">
            <span class="flex items-center justify-between">
              <span class="flex items-center gap-2">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
                <span>Phrases</span>
              </span>
              <span id="phraseCount" class="text-xs opacity-60">0</span>
            </span>
          </button>
        </section>
      </div>
    </aside>

    <!-- ===== 中部主区域 ===== -->
    <main class="flex-1 min-w-0 px-5 lg:px-8 py-6 overflow-x-hidden">

      <!-- 搜索 + 添加单词 -->
      <div class="mb-6 space-y-3">
        <div class="flex flex-col sm:flex-row sm:flex-wrap gap-3">
          <div class="relative flex-1 min-w-[200px]">
            <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 dark:text-gray-500 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input id="searchInput" type="text" placeholder="搜索单词、释义、例句…"
                   class="w-full pl-11 pr-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-sm outline-none focus:border-indigo-400 dark:focus:border-indigo-500 focus:ring-1 focus:ring-indigo-400/30 transition-all">
          </div>
          <div class="flex gap-2 flex-1 min-w-[260px] max-w-[380px]">
            <input id="addWordInput" type="text" placeholder="输入单词或短语…"
                   class="flex-1 px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-sm outline-none focus:border-indigo-400 dark:focus:border-indigo-500 focus:ring-1 focus:ring-indigo-400/30 transition-all"
                   autocomplete="off">
            <button id="addWordBtn"
                    class="shrink-0 px-5 py-2.5 rounded-xl bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 text-sm font-medium hover:bg-gray-800 dark:hover:bg-gray-200 transition-all active:scale-95">
              生成卡片
            </button>
            <button id="toggleImportBtn"
                    class="shrink-0 px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-sm text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all"
                    title="批量导入">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
            </button>
          </div>
        </div>

        <!-- 批量导入区域 -->
        <div id="importArea" class="import-area">
          <div class="p-4 rounded-xl border border-dashed border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50">
            <p class="text-xs text-gray-500 dark:text-gray-400 mb-2">每行一个单词，支持空格分隔的短语。已有单词会自动跳过。</p>
            <textarea id="importTextarea" rows="4" placeholder="paradigm&#10;empirical&#10;take for granted"
                      class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-sm outline-none focus:border-indigo-400 dark:focus:border-indigo-500 focus:ring-1 focus:ring-indigo-400/30 transition-all resize-y"></textarea>
            <div class="flex items-center justify-between mt-2">
              <span id="importStatus" class="text-xs text-gray-400"></span>
              <button id="importBtn"
                      class="px-5 py-2 rounded-xl bg-indigo-500 text-white text-sm font-medium hover:bg-indigo-600 transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                批量导入
              </button>
            </div>
          </div>
        </div>

        <div id="activeFilters" class="flex flex-wrap items-center gap-2 lg:hidden"></div>
      </div>

      <!-- 卡片网格 -->
      <div id="cardGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3 gap-4 lg:gap-5"></div>

      <!-- 空状态 -->
      <div id="emptyState" class="hidden text-center py-24">
        <p class="text-4xl mb-4 select-none">📭</p>
        <p class="text-gray-400 dark:text-gray-500 text-sm">没有匹配的单词</p>
        <p class="text-gray-300 dark:text-gray-600 text-xs mt-1">试试其他筛选条件，或添加新单词</p>
      </div>

      <div id="mobileStatsPanel" class="lg:hidden hidden mt-6 p-4 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900"></div>
    </main>

    <!-- ===== 右侧边栏：记忆曲线追踪面板 ===== -->
    <aside id="rightSidebar" class="
      lg:block lg:w-44 lg:flex-shrink-0 lg:sticky lg:top-[57px] lg:max-h-[calc(100vh-57px)] lg:overflow-y-auto lg:border-l lg:border-gray-200/70 dark:lg:border-gray-800/70 lg:bg-white/50 dark:lg:bg-[#0f0f13]/50
      hidden
    ">
      <div class="p-3">
        <p class="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-3">记忆追踪</p>

        <!-- 待复习入口 -->
        <button id="reviewQueueBtn" class="w-full text-left px-2.5 py-2 rounded-lg text-xs font-medium transition-colors mb-3
          text-indigo-600 dark:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 border border-indigo-200 dark:border-indigo-800">
          <span class="flex items-center justify-between">
            <span class="flex items-center gap-1.5">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              <span>待复习</span>
            </span>
            <span id="reviewCount" class="tabular-nums">0</span>
          </span>
        </button>

        <div id="memoryStats" class="space-y-1"></div>
        <div class="mt-5 pt-4 border-t border-gray-100 dark:border-gray-800">
          <div class="text-xs text-gray-400 dark:text-gray-500 mb-1.5">掌握进度</div>
          <div class="w-full h-1.5 bg-gray-100 dark:bg-gray-800 rounded-full overflow-hidden">
            <div id="masteryBar" class="h-full bg-indigo-500 rounded-full transition-all duration-500" style="width: 0%"></div>
          </div>

  <!-- ================================================================== -->
  <!--  JavaScript                                                         -->
  <!-- ================================================================== -->
  <script>
  (function () {
    var words        = [];
    var posFilter    = 'all';
    var stageFilter  = 'all';
    var typeFilter   = 'all';
    var reviewFilter = false;  // 仅显示待复习
    var search       = '';
    var modalId      = null;   // 当前弹窗展示的单词 UUID
    var undoDeleteTimer = null; // 删除撤销定时器

    var STAGE_LABELS  = ['未掌握', '★', '★★', '✓'];
    var STAGE_SHORT   = ['未掌握', '★', '★★', '✓'];
    var REVIEW_LABELS = ['', '1天后', '3天后', '7天后'];

    var BADGE_CLASSES = [
      'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 border-slate-200 dark:border-slate-700',
      'bg-amber-50 dark:bg-amber-900/25 text-amber-700 dark:text-amber-400 border-amber-200 dark:border-amber-800',
      'bg-emerald-50 dark:bg-emerald-900/25 text-emerald-700 dark:text-emerald-400 border-emerald-200 dark:border-emerald-800',
      'bg-indigo-50 dark:bg-indigo-900/25 text-indigo-700 dark:text-indigo-400 border-indigo-200 dark:border-indigo-800'
    ];

    var PROMOTE_CLASSES = [
      'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-amber-50 dark:hover:bg-amber-900/30 hover:text-amber-700 dark:hover:text-amber-400',
      'bg-amber-50 dark:bg-amber-900/20 text-amber-700 dark:text-amber-400 hover:bg-emerald-50 dark:hover:bg-emerald-900/30 hover:text-emerald-700 dark:hover:text-emerald-400',
      'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 hover:text-indigo-700 dark:hover:text-indigo-400',
      'bg-indigo-50 dark:bg-indigo-900/20 text-indigo-700 dark:text-indigo-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-600 dark:hover:text-slate-400'
    ];

    var DEMOTE_CLASSES = [
      'hidden',
      'bg-amber-50 dark:bg-amber-900/20 text-amber-700 dark:text-amber-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-600 dark:hover:text-slate-400',
      'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-400 hover:bg-amber-50 dark:hover:bg-amber-900/30 hover:text-amber-700 dark:hover:text-amber-400',
      'bg-indigo-50 dark:bg-indigo-900/20 text-indigo-700 dark:text-indigo-400 hover:bg-emerald-50 dark:hover:bg-emerald-900/30 hover:text-emerald-700 dark:hover:text-emerald-400'
    ];

    var POS_DEFS = [
      { key: 'all',  label: 'all',   cssClass: 'pos-all'  },
      { key: 'n',    label: 'n.',    cssClass: 'pos-n'    },
      { key: 'v',    label: 'v.',    cssClass: 'pos-v'    },
      { key: 'adj',  label: 'adj.',  cssClass: 'pos-adj'  },
      { key: 'adv',  label: 'adv.',  cssClass: 'pos-adv'  },
      { key: 'prep', label: 'prep.', cssClass: 'pos-prep' },
      { key: 'conj', label: 'conj.', cssClass: 'pos-conj' },
    ];

    /* ================================================================== */
    /*  DOM 引用                                                            */
    /* ================================================================== */
    var grid            = document.getElementById('cardGrid');
    var empty           = document.getElementById('emptyState');
    var searchInp       = document.getElementById('searchInput');
    var addInp          = document.getElementById('addWordInput');
    var addBtn          = document.getElementById('addWordBtn');
    var countSpan       = document.getElementById('wordCount');
    var toggleBtn       = document.getElementById('themeToggle');
    var iconSun         = document.getElementById('iconSun');
    var iconMoon        = document.getElementById('iconMoon');
    var posBadgeGrid    = document.getElementById('posBadgeGrid');
    var phraseFilterBtn = document.getElementById('phraseFilterBtn');
    var phraseCount     = document.getElementById('phraseCount');
    var memoryStats     = document.getElementById('memoryStats');
    var masteryBar      = document.getElementById('masteryBar');
    var masteryPercent  = document.getElementById('masteryPercent');
    var activeFilters   = document.getElementById('activeFilters');
    var mobileStatsPanel = document.getElementById('mobileStatsPanel');
    var leftSidebar     = document.getElementById('leftSidebar');
    var rightSidebar    = document.getElementById('rightSidebar');
    var reviewQueueBtn  = document.getElementById('reviewQueueBtn');
    var reviewCount     = document.getElementById('reviewCount');
    var toggleImportBtn = document.getElementById('toggleImportBtn');
    var importArea      = document.getElementById('importArea');
    var importTextarea  = document.getElementById('importTextarea');
    var importBtn       = document.getElementById('importBtn');
    var importStatus    = document.getElementById('importStatus');

    // 模态框
    var wordModal        = document.getElementById('wordModal');
    var modalOverlay     = document.getElementById('modalOverlay');
    var modalClose       = document.getElementById('modalClose');
    var modalBody        = document.getElementById('modalBody');
    var modalWord        = document.getElementById('modalWord');
    var modalPhonetic    = document.getElementById('modalPhonetic');
    var modalPos        = document.getElementById('modalPos');
    var modalEnDef      = document.getElementById('modalEnDef');
    var modalDefinition  = document.getElementById('modalDefinition');
    var modalSentence    = document.getElementById('modalSentence');
    var modalTranslation = document.getElementById('modalTranslation');
    var modalStageLabel  = document.getElementById('modalStageLabel');
    var modalPromoteBtn  = document.getElementById('modalPromoteBtn');
    var modalDemoteBtn   = document.getElementById('modalDemoteBtn');
    var modalEnrichBtn   = document.getElementById('modalEnrichBtn');
    var modalDeleteBtn   = document.getElementById('modalDeleteBtn');
    var modalVariationsWrap = document.getElementById('modalVariationsWrap');
    var modalVariations  = document.getElementById('modalVariations');
    var modalPhrasesWrap = document.getElementById('modalPhrasesWrap');
    var modalPhrases     = document.getElementById('modalPhrases');

    /* ================================================================== */
    /*  工具函数                                                            */
    /* ================================================================== */
    function findWordById(id) {
      for (var i = 0; i < words.length; i++) {
        if (words[i].id === id) return { word: words[i], index: i };
      }
      return null;
    }

    function todayStr() {
      return new Date().toISOString().split('T')[0];
    }

    function isDueToday(w) {
      return (w.review_date || '') <= todayStr() && (w.mastery_stage || 0) < 3;
    }

    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    /* ================================================================== */
    /*  Toast（支持撤销按钮）                                                 */
    /* ================================================================== */
    function toast(msg, type, opts) {
      type = type || 'success';
      opts = opts || {};
      var el = document.createElement('div');
      el.className = 'toast toast-' + type;
      el.textContent = msg;
      if (opts.undoLabel && opts.onUndo) {
        el.classList.add('toast-undo');
        el.style.animation = 'toastIn 0.35s ease';
        var btn = document.createElement('button');
        btn.className = 'toast-undo-btn';
        btn.textContent = opts.undoLabel;
        btn.addEventListener('click', function() {
          opts.onUndo();
          el.remove();
        });
        el.appendChild(btn);
      }
      document.getElementById('toastContainer').appendChild(el);
      var duration = opts.duration || 3000;
      if (!opts.undoLabel) {
        setTimeout(function () { el.remove(); }, duration);
      } else {
        // 撤销类 toast：超时后自动消失
        setTimeout(function () {
          if (el.parentNode) el.remove();
        }, duration);
      }
      return el;
    }

    /* ================================================================== */
    /*  暗黑模式                                                            */
    /* ================================================================== */
    function applyTheme(dark) {
      document.documentElement.classList.toggle('dark', dark);
      iconSun.classList.toggle('hidden', dark);
      iconMoon.classList.toggle('hidden', !dark);
      try { localStorage.setItem('kaoyan-theme', dark ? 'dark' : 'light'); } catch (_) {}
    }
    toggleBtn.addEventListener('click', function () {
      applyTheme(!document.documentElement.classList.contains('dark'));
    });
    (function initTheme() {
      var saved;
      try { saved = localStorage.getItem('kaoyan-theme'); } catch (_) {}
      if (saved === 'dark')      applyTheme(true);
      else if (saved === 'light') applyTheme(false);
      else applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
    })();

    /* ================================================================== */
    /*  词性提取                                                            */
    /* ================================================================== */
    function extractPosTags(w) {
      if (w.part_of_speech) {
        var m = w.part_of_speech.match(/\b([a-z]+)\./i);
        if (m) return [m[1].toLowerCase()];
      }
      var matches = (w.definition || '').match(/\b(n|v|adj|adv|prep|conj|pron|art|num|int|vi|vt)\./gi);
      if (!matches) return ['other'];
      return matches.map(function(m) { return m.replace(/\.$/,'').toLowerCase(); });
    }

    /* ================================================================== */
    /*  数据加载                                                            */
    /* ================================================================== */
    function loadWords() {
      var url = '/api/words';
      if (reviewFilter) url += '?filter=due';
      fetch(url)
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(function (data) {
          words = data;
          words.forEach(function(w) {
            if (typeof w.mastery_stage === 'undefined') {
              w.mastery_stage = (w.status === '已熟记') ? 1 : 0;
            }
            if (typeof w.type === 'undefined') {
              w.type = (w.word || '').indexOf(' ') !== -1 ? 'phrase' : 'word';
            }
            if (!Array.isArray(w.variations)) w.variations = [];
            if (!Array.isArray(w.phrases)) w.phrases = [];
            if (!w.id) w.id = w.word; // fallback
          });
          renderAll();
        })
        .catch(function () {
          toast('无法加载单词列表，请确认后端已启动', 'error');
        });
    }

    /* ================================================================== */
    /*  综合过滤                                                            */
    /* ================================================================== */
    function filteredWords() {
      var today = todayStr();
      return words.filter(function (w) {
        // 类型过滤
        if (typeFilter === 'phrase' && (w.type || 'word') !== 'phrase') return false;

        // 词性过滤
        if (posFilter !== 'all') {
          var tags = extractPosTags(w);
          if (tags.indexOf(posFilter) === -1) return false;
        }

        // 熟记阶段过滤
        if (stageFilter !== 'all') {
          if (w.mastery_stage !== parseInt(stageFilter)) return false;
        }

        // 待复习过滤
        if (reviewFilter) {
          if ((w.review_date || '') > today || (w.mastery_stage || 0) >= 3) return false;
        }

        // 搜索过滤：匹配单词、释义、音标、例句、翻译、变形、短语
        if (search) {
          var q = search.toLowerCase();
          var haystack = [
            w.word || '',
            w.phonetic || '',
            w.definition || '',
            w.sentence || '',
            w.translation || '',
            (w.variations || []).map(function(v) { return v.form + ' ' + (v.meaning || ''); }).join(' '),
            (w.phrases || []).map(function(p) { return p.phrase + ' ' + (p.meaning || ''); }).join(' ')
          ].join(' ').toLowerCase();
          if (haystack.indexOf(q) === -1) return false;
        }

        return true;
      });
    }

    /* ================================================================== */
    /*  渲染左侧边栏                                                          */
    /* ================================================================== */
    function renderLeftSidebar() {
      var counts = {};
      POS_DEFS.forEach(function(p) { counts[p.key] = 0; });
      counts['other'] = 0;

      words.forEach(function(w) {
        var tags = extractPosTags(w.definition || '');
        var counted = {};
        tags.forEach(function(t) {
          if (!counted[t]) {
            counts[t] = (counts[t] || 0) + 1;
            counted[t] = true;
          }
        });
      });

      var badgeHtml = '';
      POS_DEFS.forEach(function(p) {
        var isActive = posFilter === p.key;
        var count = p.key === 'all' ? words.length : (counts[p.key] || 0);
        badgeHtml += '<button class="pos-badge ' + p.cssClass + (isActive ? ' active' : '') +
          '" data-pos="' + p.key + '" title="' + p.label + ' (' + count + ')">' +
          '<span class="pos-dot ' + p.cssClass + '"></span>' +
          '<span class="flex-1 text-left">' + p.label + '</span>' +
          '<span class="text-xs opacity-50">' + count + '</span>' +
        '</button>';
      });
      posBadgeGrid.innerHTML = badgeHtml;

      posBadgeGrid.querySelectorAll('.pos-badge').forEach(function(badge) {
        badge.addEventListener('click', function() {
          posFilter = badge.dataset.pos;
          renderAll();
        });
      });

      var phraseTotal = words.filter(function(w) { return (w.type || 'word') === 'phrase'; }).length;
      phraseCount.textContent = phraseTotal;

      phraseFilterBtn.classList.toggle('active', typeFilter === 'phrase');
      if (typeFilter === 'phrase') {
        phraseFilterBtn.classList.add('bg-gray-900', 'dark:bg-gray-100', 'text-white', 'dark:text-gray-900');
      } else {
        phraseFilterBtn.classList.remove('bg-gray-900', 'dark:bg-gray-100', 'text-white', 'dark:text-gray-900');
      }
    }

    phraseFilterBtn.addEventListener('click', function() {
      typeFilter = (typeFilter === 'phrase') ? 'all' : 'phrase';
      renderAll();
    });

    /* ================================================================== */
    /*  渲染右侧记忆追踪面板                                                  */
    /* ================================================================== */
    function renderMemoryPanel() {
      var counts = [0, 0, 0, 0];
      var dueCount = 0;
      var today = todayStr();
      words.forEach(function(w) {
        var s = w.mastery_stage || 0;
        if (s >= 0 && s <= 3) counts[s]++;
        if ((w.review_date || '') <= today && s < 3) dueCount++;
      });

      var total = words.length;
      var pct = total > 0 ? Math.round((counts[3] / total) * 100) : 0;

      if (total > 0) {
        var weighted = (counts[1] * 0.33 + counts[2] * 0.66 + counts[3] * 1) / total * 100;
        masteryBar.style.width = Math.round(weighted) + '%';
      } else {
        masteryBar.style.width = '0%';
      }
      masteryPercent.textContent = pct + '% ✓';

      // 待复习按钮
      reviewCount.textContent = dueCount;
      if (reviewFilter) {
        reviewQueueBtn.classList.add('bg-indigo-500', 'text-white', 'border-indigo-500');
        reviewQueueBtn.classList.remove('text-indigo-600', 'dark:text-indigo-400', 'border-indigo-200', 'dark:border-indigo-800', 'hover:bg-indigo-50', 'dark:hover:bg-indigo-900/30');
      } else {
        reviewQueueBtn.classList.remove('bg-indigo-500', 'text-white', 'border-indigo-500');
        reviewQueueBtn.classList.add('text-indigo-600', 'dark:text-indigo-400', 'border-indigo-200', 'dark:border-indigo-800', 'hover:bg-indigo-50', 'dark:hover:bg-indigo-900/30');
      }

      // 各阶段按钮
      var stageKeys = [
        { key: '0', label: '未掌握',  color: 'bg-slate-400',      count: counts[0] },
        { key: '1', label: '★',       color: 'bg-amber-400',      count: counts[1] },
        { key: '2', label: '★★',      color: 'bg-emerald-400',    count: counts[2] },
        { key: '3', label: '✓',       color: 'bg-indigo-400',     count: counts[3] },
      ];

      var html = '';
      stageKeys.forEach(function(s) {
        var isActive = stageFilter === s.key;
        html += '<button class="w-full text-left px-2.5 py-1.5 rounded-lg text-xs transition-colors ' +
          (isActive
            ? 'bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900'
            : 'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800') +
          '" data-stage="' + s.key + '">' +
          '<span class="flex items-center justify-between">' +
            '<span class="flex items-center gap-1.5">' +
              '<span class="w-2 h-2 rounded-full flex-shrink-0 ' + s.color + '"></span>' +
              '<span>' + s.label + '</span>' +
            '</span>' +
            '<span class="tabular-nums text-xs ' + (isActive ? 'opacity-80' : 'opacity-50') + '">' + s.count + '</span>' +
          '</span>' +
        '</button>';
      });

      memoryStats.innerHTML = html;

      memoryStats.querySelectorAll('button').forEach(function(btn) {
        btn.addEventListener('click', function() {
          stageFilter = (stageFilter === btn.dataset.stage) ? 'all' : btn.dataset.stage;
          reviewFilter = false;
          renderAll();
        });
      });

      // 移动端统计面板
      var mobileHtml = '<div class="flex items-center gap-3 flex-wrap">' +
        '<span class="text-xs text-gray-400 dark:text-gray-500">记忆追踪:</span>';
      stageKeys.forEach(function(s) {
        mobileHtml += '<button class="px-2.5 py-1 rounded-lg text-xs font-medium border transition-colors ' +
          (stageFilter === s.key
            ? 'bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 border-gray-900 dark:border-gray-100'
            : 'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-400 border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700') +
          '" data-stage-mobile="' + s.key + '">' +
          '<span class="inline-block w-1.5 h-1.5 rounded-full ' + s.color + ' mr-1"></span>' +
          s.label + ' ' + s.count +
        '</button>';
      });
      // 待复习移动端
      mobileHtml += '<button class="px-2.5 py-1 rounded-lg text-xs font-medium border transition-colors ' +
        (reviewFilter
          ? 'bg-indigo-500 text-white border-indigo-500'
          : 'bg-white dark:bg-gray-800 text-indigo-600 dark:text-indigo-400 border-indigo-200 dark:border-indigo-800 hover:bg-indigo-50 dark:hover:bg-indigo-900/30') +
        '" data-review-mobile="1">⏳ 待复习 ' + dueCount + '</button>';
      mobileHtml += '</div>';
      mobileStatsPanel.innerHTML = mobileHtml;

      mobileStatsPanel.querySelectorAll('button[data-stage-mobile]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          stageFilter = (stageFilter === btn.dataset.stageMobile) ? 'all' : btn.dataset.stageMobile;
          reviewFilter = false;
          renderAll();
        });
      });
      var mobileReviewBtn = mobileStatsPanel.querySelector('button[data-review-mobile]');
      if (mobileReviewBtn) {
        mobileReviewBtn.addEventListener('click', function() {
          reviewFilter = !reviewFilter;
          if (reviewFilter) { stageFilter = 'all'; }
          renderAll();
        });
      }
    }

    // 待复习按钮
    reviewQueueBtn.addEventListener('click', function() {
      reviewFilter = !reviewFilter;
      if (reviewFilter) { stageFilter = 'all'; }
      renderAll();
    });

    /* ================================================================== */
    /*  渲染激活筛选标签                                                       */
    /* ================================================================== */
    function renderActiveFilters() {
      var chips = [];
      if (reviewFilter) {
        chips.push({ label: '待复习', clear: function() { reviewFilter = false; renderAll(); } });
      }
      if (typeFilter === 'phrase') {
        chips.push({ label: 'Phrases', clear: function() { typeFilter = 'all'; renderAll(); } });
      }
      if (posFilter !== 'all') {
        var found = POS_DEFS.find(function(p) { return p.key === posFilter; });
        chips.push({ label: found ? found.label : posFilter, clear: function() { posFilter = 'all'; renderAll(); } });
      }
      if (stageFilter !== 'all') {
        chips.push({ label: STAGE_LABELS[parseInt(stageFilter)], clear: function() { stageFilter = 'all'; renderAll(); } });
      }

      var html = '';
      chips.forEach(function(c) {
        html += '<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-lg text-xs font-medium bg-indigo-50 dark:bg-indigo-900/25 text-indigo-700 dark:text-indigo-400 border border-indigo-200 dark:border-indigo-800">' +
          c.label +
          '<button class="w-3.5 h-3.5 flex items-center justify-center rounded-full hover:bg-indigo-200 dark:hover:bg-indigo-800 transition-colors ml-0.5" title="清除">' +
            '<svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>' +
          '</button>' +
        '</span>';
      });
      if (chips.length > 0) {
        html += '<button class="text-xs text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 underline transition-colors">清除全部</button>';
      }

      activeFilters.innerHTML = html;

      var clearAll = activeFilters.querySelector('button');
      if (clearAll) {
        clearAll.addEventListener('click', function() {
          posFilter = 'all';
          stageFilter = 'all';
          typeFilter = 'all';
          reviewFilter = false;
          renderAll();
        });
      }

      activeFilters.querySelectorAll('span button').forEach(function(btn, i) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          if (chips[i]) chips[i].clear();
        });
      });
    }

    /* ================================================================== */
    /*  渲染单词卡片网格                                                      */
    /* ================================================================== */
    function renderCardGrid() {
      var list = filteredWords();
      countSpan.textContent = words.length + ' 词';

      if (list.length === 0) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
      } else {
        empty.classList.add('hidden');
      }

      grid.innerHTML = '';
      list.forEach(function (w, n) {
        var wid   = w.id;
        var stage = w.mastery_stage || 0;
        var badgeClass = BADGE_CLASSES[stage];
        var promoteClass = PROMOTE_CLASSES[stage];
        var stageLabel = STAGE_LABELS[stage];
        var nextStage = stage >= 3 ? 0 : stage + 1;
        var promoteTitle = stage >= 3 ? '重置为未掌握' : '晋升为「' + STAGE_LABELS[nextStage] + '」';
        var isPhrase = (w.type || 'word') === 'phrase';
        var isDue = (w.review_date || '') <= todayStr() && stage < 3;

        var card = document.createElement('div');
        card.className = 'group relative rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-[#14141b] hover:shadow-lg hover:border-gray-300 dark:hover:border-gray-600 transition-all duration-300 cursor-pointer';
        card.style.animation = 'cardEnter 0.4s ease both';
        card.style.animationDelay = (n * 0.03) + 's';
        card.dataset.wordId = wid;

        card.addEventListener('contextmenu', function(e) { e.preventDefault(); });

        card.innerHTML =
          '<div class="p-4 flex flex-col h-[235px]">' +
            '<div class="flex items-start justify-between gap-2 mb-0.5">' +
              '<div class="flex items-center gap-2 min-w-0 flex-1">' +
                '<h3 class="word-text text-lg font-bold tracking-tight text-gray-900 dark:text-gray-100 truncate flex-1 min-w-0">' + esc(w.word) + '</h3>' +
                (isDue ? '<span class="shrink-0 w-2 h-2 rounded-full bg-indigo-400" title="待复习"></span>' : '') +
                (isPhrase ? '<span class="shrink-0 text-[10px] text-gray-400 dark:text-gray-500 bg-gray-50 dark:bg-gray-800 px-1.5 py-0.5 rounded">PHR</span>' : '') +
              '</div>' +
              '<span class="status-badge shrink-0 inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium border ' + badgeClass + '">' +
                stageLabel +
              '</span>' +
            '</div>' +
            '<p class="text-xs text-gray-400 dark:text-gray-500 font-mono mb-1 truncate">' + esc(w.phonetic || '') + '</p>' +
            ((w.part_of_speech || w.en_definition)
              ? '<p class="text-xs mb-1.5 leading-relaxed line-clamp-2">' +
                  (w.part_of_speech ? '<span class="italic text-gray-400 dark:text-gray-500 font-medium">' + esc(w.part_of_speech) + '</span> ' : '') +
                  (w.en_definition ? '<span class="text-gray-500 dark:text-gray-400 font-light">' + esc(w.en_definition) + '</span>' : '') +
                '</p>'
              : '') +
            '<p class="text-sm text-gray-700 dark:text-gray-300 leading-relaxed flex-1 overflow-hidden">' + esc(w.definition || '') + '</p>' +
            '<div class="flex items-end justify-between mt-2 pt-2 border-t border-gray-50 dark:border-gray-800">' +
              '<span class="text-xs text-gray-300 dark:text-gray-600 truncate max-w-[60%]">' +
                (isDue ? '⏳ 待复习' : (w.sentence ? esc(w.sentence).substring(0, 28) + '…' : '暂无例句')) +
              '</span>' +
              '<span class="flex items-center gap-1 shrink-0">' +
                '<button class="demote-btn shrink-0 w-7 h-7 flex items-center justify-center rounded-lg border transition-all ' + DEMOTE_CLASSES[stage] + ' border-current/20" ' +
                  'title="退回上一级" data-wid="' + wid + '">' +
                  '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
                    '<path d="M11 7l-5 5m0 0l5 5m-5-5h12"/>' +
                  '</svg>' +
                '</button>' +
                '<button class="promote-btn shrink-0 w-7 h-7 flex items-center justify-center rounded-lg border transition-all ' + promoteClass + ' border-current/20" ' +
                  'title="' + promoteTitle + '" data-wid="' + wid + '">' +
                  '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
                    '<path d="M13 7l5 5m0 0l-5 5m5-5H6"/>' +
                  '</svg>' +
                '</button>' +
              '</span>' +
            '</div>' +
          '</div>';

        card.addEventListener('click', function(e) {
          if (e.target.closest('.promote-btn') || e.target.closest('.demote-btn')) return;
          openModal(wid);
        });

        grid.appendChild(card);
      });

      grid.querySelectorAll('.promote-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          promoteStage(btn.dataset.wid);
        });
      });

      grid.querySelectorAll('.demote-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          adjustStage(btn.dataset.wid, -1);
        });
      });
    }

    /* ================================================================== */
    /*  晋升熟记阶段                                                          */
    /* ================================================================== */
    function promoteStage(wid) {
      var found = findWordById(wid);
      if (!found) return;
      var w = found.word;
      var oldStage = w.mastery_stage || 0;
      var newStage = oldStage >= 3 ? 0 : oldStage + 1;

      fetch('/api/words/' + wid, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mastery_stage: newStage })
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          w.mastery_stage = data.mastery_stage;
          w.review_date = data.review_date;
          renderAll();
          if (modalId === wid) updateModalContent();
          var extra = '';
          if (newStage > 0 && newStage <= 3) {
            extra = '（' + REVIEW_LABELS[newStage] + '后复习）';
          }
          toast('「' + w.word + '」→ ' + STAGE_LABELS[newStage] + ' ' + extra);
        })
        .catch(function () { toast('状态更新失败', 'error'); });
    }

    /* ================================================================== */
    /*  充实卡片                                                              */
    /* ================================================================== */
    function enrichWord(wid) {
      var found = findWordById(wid);
      if (!found) return;
      var w = found.word;
      modalEnrichBtn.disabled = true;
      var origHTML = modalEnrichBtn.innerHTML;
      modalEnrichBtn.innerHTML = '<svg class="w-4 h-4 animate-spin text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="4" class="opacity-25"/><path d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" fill="currentColor" class="opacity-75"/></svg>';

      fetch('/api/words/' + wid + '/enrich', { method: 'POST' })
        .then(function(r) { return r.json().then(function(d) { if (!r.ok) throw new Error(d.error || '充实失败'); return d; }); })
        .then(function(data) {
          ['word','phonetic','definition','sentence','translation','variations','phrases','part_of_speech','en_definition'].forEach(function(k) {
            if (k in data) w[k] = data[k];
          });
          renderAll();
          if (modalId === wid) updateModalContent();
          toast('「' + w.word + '」已更新');
        })
        .catch(function(err) { toast(err.message, 'error'); })
        .finally(function() {
          modalEnrichBtn.disabled = false;
          modalEnrichBtn.innerHTML = origHTML;
        });
    }

    /* ================================================================== */
    /*  方向键调整熟记阶段                                                      */
    /* ================================================================== */
    function adjustStage(wid, delta) {
      var found = findWordById(wid);
      if (!found) return;
      var w = found.word;
      var oldStage = w.mastery_stage || 0;
      var newStage = oldStage + delta;
      if (newStage < 0) newStage = 0;
      if (newStage > 3) newStage = 3;
      if (newStage === oldStage) return;

      fetch('/api/words/' + wid, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mastery_stage: newStage })
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          w.mastery_stage = data.mastery_stage;
          w.review_date = data.review_date;
          renderAll();
          if (modalId === wid) updateModalContent();
          var dir = delta > 0 ? '⬆' : '⬇';
          toast(dir + ' 「' + w.word + '」→ ' + STAGE_LABELS[newStage]);
        })
        .catch(function () { toast('状态更新失败', 'error'); });
    }

    /* ================================================================== */
    /*  删除单词（带撤销）                                                      */
    /* ================================================================== */
    function deleteWord(wid, fromModal) {
      var found = findWordById(wid);
      if (!found) return;
      var w = found.word;
      var idx = found.index;

      // 先关闭弹窗
      if (fromModal && modalId === wid) closeModal();

      // 暂存并移除
      var backup = words.splice(idx, 1)[0];
      renderAll();

      // 显示撤销 toast
      var toastEl = toast('已删除「' + w.word + '」', 'error', {
        undoLabel: '撤销',
        duration: 3500,
        onUndo: function() {
          // 恢复单词
          words.splice(idx, 0, backup);
          if (undoDeleteTimer) { clearTimeout(undoDeleteTimer); undoDeleteTimer = null; }
          renderAll();
          toast('已恢复「' + w.word + '」');
        }
      });

      // 3 秒后真正删除
      undoDeleteTimer = setTimeout(function() {
        undoDeleteTimer = null;
        fetch('/api/words/' + wid, { method: 'DELETE' })
          .then(function (r) { return r.json(); })
          .catch(function () { /* 静默失败 */ });
        if (toastEl.parentNode) toastEl.remove();
      }, 3000);
    }

    /* ================================================================== */
    /*  添加单词                                                            */
    /* ================================================================== */
    function addWord() {
      var raw = addInp.value.trim();
      if (!raw) { toast('请输入一个英文单词或短语', 'error'); return; }

      addBtn.disabled = true;
      addBtn.textContent = '查询中…';

      fetch('/api/words', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ word: raw })
      })
        .then(function (r) {
          return r.json().then(function (data) {
            if (!r.ok) { toast(data.error || '添加失败', 'error'); return; }
            words.push(data);
            addInp.value = '';
            renderAll();
            var label = (data.type === 'phrase') ? '短语' : '单词';
            toast('已生成' + label + '「' + (data.word || raw) + '」');
          });
        })
        .catch(function () { toast('请求失败，请检查网络或 API Key', 'error'); })
        .finally(function () {
          addBtn.disabled = false;
          addBtn.textContent = '生成卡片';
        });
    }

    addBtn.addEventListener('click', addWord);
    addInp.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') addWord();
    });

    /* ================================================================== */
    /*  批量导入                                                            */
    /* ================================================================== */
    toggleImportBtn.addEventListener('click', function() {
      importArea.classList.toggle('open');
      if (importArea.classList.contains('open')) {
        importTextarea.focus();
      }
    });

    importBtn.addEventListener('click', function() {
      var raw = importTextarea.value.trim();
      if (!raw) { toast('请粘贴要导入的单词列表', 'error'); return; }
      var wordList = raw.split(/[\n,]+/).map(function(s) { return s.trim(); }).filter(Boolean);
      if (wordList.length === 0) { toast('未识别到有效单词', 'error'); return; }

      importBtn.disabled = true;
      importBtn.textContent = '导入中…';
      importStatus.textContent = '正在导入 ' + wordList.length + ' 个单词…';

      fetch('/api/words/batch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ words: wordList })
      })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var added = data.results.filter(function(r) { return r.status === 'added'; });
          added.forEach(function(r) { words.push(r.data); });
          var skipped = data.skipped || 0;
          importTextarea.value = '';
          importStatus.textContent = '';
          renderAll();
          toast('导入完成：新增 ' + data.added + ' 个' + (skipped > 0 ? '，跳过 ' + skipped + ' 个已存在' : ''));
        })
        .catch(function() { toast('批量导入失败', 'error'); })
        .finally(function() {
          importBtn.disabled = false;
          importBtn.textContent = '批量导入';
        });
    });

    /* ================================================================== */
    /*  搜索                                                                */
    /* ================================================================== */
    searchInp.addEventListener('input', function () {
      search = searchInp.value.trim().toLowerCase();
      renderCardGrid();
    });

    /* ================================================================== */
    /*  模态框操作                                                           */
    /* ================================================================== */
    function openModal(wid) {
      modalId = wid;
      updateModalContent();
      wordModal.style.display = 'flex';
      wordModal.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
      modalBody.style.animation = 'none';
      modalBody.offsetHeight;
      modalBody.style.animation = 'modalIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards';
    }

    function closeModal() {
      modalBody.style.animation = 'modalOut 0.2s cubic-bezier(0.4, 0, 0.2, 1) forwards';
      setTimeout(function() {
        wordModal.style.display = 'none';
        wordModal.classList.add('hidden');
        modalId = null;
        document.body.style.overflow = '';
      }, 190);
    }

    function updateModalContent() {
      if (!modalId) return;
      var found = findWordById(modalId);
      if (!found) return;
      var w = found.word;
      var stage = w.mastery_stage || 0;
      var nextStage = stage >= 3 ? 0 : stage + 1;
      var prevStage = stage - 1;

      modalWord.textContent = w.word || '';
      modalPhonetic.textContent = w.phonetic || '';
      modalPos.textContent = w.part_of_speech || '';
      modalEnDef.textContent = w.en_definition || '';
      modalDefinition.textContent = w.definition || '';
      modalSentence.innerHTML = (w.sentence ? '&ldquo;' + esc(w.sentence) + '&rdquo;' : '暂无例句');
      modalTranslation.textContent = w.translation || '';
      modalStageLabel.textContent = '当前状态：' + STAGE_LABELS[stage];
      if (w.review_date && stage < 3) {
        modalStageLabel.textContent += '  ·  下次复习：' + w.review_date;
      }

      modalEnrichBtn.onclick = function() { enrichWord(modalId); };
      modalDeleteBtn.onclick = function() { deleteWord(modalId, true); };

      // 常见变形
      var variations = w.variations || [];
      if (variations.length > 0) {
        modalVariationsWrap.classList.remove('hidden');
        var varHtml = '';
        variations.forEach(function(v) {
          varHtml += '<span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50">' +
            '<span class="word-text font-semibold text-gray-900 dark:text-gray-100">' + esc(v.form) + '</span>' +
            '<span class="text-xs text-gray-400 dark:text-gray-500">' + esc(v.pos || '') + '</span>' +
            '<span class="text-xs text-gray-500 dark:text-gray-400">' + esc(v.meaning || '') + '</span>' +
          '</span>';
        });
        modalVariations.innerHTML = varHtml;
      } else {
        modalVariationsWrap.classList.add('hidden');
      }

      // 常见短语
      var phrases = w.phrases || [];
      if (phrases.length > 0) {
        modalPhrasesWrap.classList.remove('hidden');
        var phrHtml = '';
        phrases.forEach(function(p) {
          phrHtml += '<div class="flex items-baseline gap-3 text-sm">' +
            '<span class="word-text font-medium text-gray-800 dark:text-gray-200 whitespace-nowrap">' + esc(p.phrase) + '</span>' +
            '<span class="text-gray-400 dark:text-gray-500">' + esc(p.meaning || '') + '</span>' +
          '</div>';
        });
        modalPhrases.innerHTML = phrHtml;
      } else {
        modalPhrasesWrap.classList.add('hidden');
      }

      // 晋升按钮
      var promoteClass = PROMOTE_CLASSES[stage];
      modalPromoteBtn.className = 'flex items-center justify-center w-10 h-10 rounded-xl text-sm font-medium transition-all active:scale-95 border border-current/20 ' + promoteClass;
      var promoteTitle = stage >= 3 ? '重新学习' : '晋升为「' + STAGE_LABELS[nextStage] + '」';
      if (stage > 0 && stage < 3 && nextStage <= 3) {
        promoteTitle += '（' + REVIEW_LABELS[nextStage] + '后复习）';
      }
      modalPromoteBtn.title = promoteTitle;
      modalPromoteBtn.onclick = function() { promoteStage(modalId); };

      // 退回按钮
      if (stage <= 0) {
        modalDemoteBtn.classList.add('hidden');
      } else {
        modalDemoteBtn.classList.remove('hidden');
        var demoteClass = DEMOTE_CLASSES[stage];
        modalDemoteBtn.className = 'flex items-center justify-center w-10 h-10 rounded-xl text-sm font-medium transition-all active:scale-95 border border-current/20 ' + demoteClass;
        modalDemoteBtn.title = '退回「' + STAGE_LABELS[prevStage] + '」';
        modalDemoteBtn.onclick = function() { adjustStage(modalId, -1); };
      }
    }

    modalClose.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', closeModal);

    document.addEventListener('keydown', function(e) {
      if (!modalId) return;
      if (e.key === 'Escape') {
        e.preventDefault();
        closeModal();
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        adjustStage(modalId, 1);
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        adjustStage(modalId, -1);
      }
    });

    /* ================================================================== */
    /*  移动端侧栏切换                                                       */
    /* ================================================================== */
    var mobilePosToggle = document.getElementById('mobilePosToggle');
    var mobileStatsToggle = document.getElementById('mobileStatsToggle');

    mobilePosToggle.addEventListener('click', function(e) {
      e.stopPropagation();
      leftSidebar.classList.toggle('hidden');
      leftSidebar.classList.toggle('mobile-sidebar-open');
    });

    mobileStatsToggle.addEventListener('click', function(e) {
      e.stopPropagation();
      mobileStatsPanel.classList.toggle('hidden');
      if (!mobileStatsPanel.classList.contains('hidden')) {
        mobileStatsPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });

    document.addEventListener('click', function(e) {
      if (!leftSidebar.classList.contains('hidden') &&
          !leftSidebar.contains(e.target) &&
          e.target !== mobilePosToggle &&
          !mobilePosToggle.contains(e.target)) {
        leftSidebar.classList.add('hidden');
        leftSidebar.classList.remove('mobile-sidebar-open');
      }
    });

    /* ================================================================== */
    /*  全局渲染                                                            */
    /* ================================================================== */
    function renderAll() {
      renderLeftSidebar();
      renderMemoryPanel();
      renderActiveFilters();
      renderCardGrid();
    }

    /* ================================================================== */
    /*  启动                                                                */
    /* ================================================================== */
    loadWords();
  })();
  </script>
</body>
</html>
