<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sync_Vocab - 登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', '"PingFang SC"', '"Microsoft YaHei"', 'sans-serif'],
            serif: ['"Playfair Display"', 'Georgia', '"Times New Roman"', 'serif'],
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #fafaf9;
    }
    .word-text {
      font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }
    .shake { animation: shake 0.4s ease; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">&#x1F4D6;</div>
      <h1 class="word-text text-3xl font-bold text-gray-900 mb-1">Sync_Vocab</h1>
      <p class="text-sm text-gray-400">输入密码以继续</p>
    </div>

    <form method="POST" class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6" autocomplete="off">
      <input
        type="password"
        name="password"
        placeholder="请输入访问密码"
        class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-900 text-sm outline-none focus:border-indigo-400 focus:ring-1 focus:ring-indigo-400/30 focus:bg-white transition-all {{ 'shake border-red-300 bg-red-50' if error else '' }}"
        autofocus
      >
      {% if error %}
      <p class="text-red-500 text-xs mt-2 text-center">{{ error }}</p>
      {% endif %}
      <button
        type="submit"
        class="w-full mt-4 py-2.5 rounded-xl bg-gray-900 text-white text-sm font-medium hover:bg-gray-800 transition-colors active:scale-[0.98]"
      >登录</button>
    </form>

    <p class="text-center text-xs text-gray-300 mt-6">Sync_Vocab &mdash; Multi-User Smart Vocabulary</p>
  </div>
</body>
</html>
