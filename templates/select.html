<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sync_Vocab - 选择用户</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', '"PingFang SC"', '"Microsoft YaHei"', 'sans-serif'],
            serif: ['"Playfair Display"', 'Georgia', '"Times New Roman"', 'serif'],
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #fafaf9;
    }
    .word-text {
      font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
    }
    .user-card {
      transition: all 0.25s ease;
    }
    .user-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.1);
    }
    .user-card:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-10">
      <div class="text-5xl mb-4">&#x1F4DA;</div>
      <h1 class="word-text text-3xl font-bold text-gray-900 mb-2">Sync_Vocab</h1>
      <p class="text-sm text-gray-400">选择你的专属词库</p>
    </div>

    {% if error %}
    <p class="text-red-500 text-xs text-center mb-4">{{ error }}</p>
    {% endif %}

    <div class="space-y-3">
      {% for user in users %}
      <form method="POST" class="user-card">
        <input type="hidden" name="user_id" value="{{ user.id }}">
        <button type="submit"
                class="w-full p-5 rounded-2xl border border-gray-200 bg-white hover:border-gray-300 text-left transition-all">
          <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-lg font-bold text-gray-500 shrink-0">
              {{ loop.index }}
            </div>
            <div>
              <p class="text-base font-semibold text-gray-900">{{ user.name }}</p>
              <p class="text-xs text-gray-400 mt-0.5">点击进入个人词库</p>
            </div>
            <svg class="w-5 h-5 text-gray-300 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path d="M9 5l7 7-7 7"/>
            </svg>
          </div>
        </button>
      </form>
      {% endfor %}
    </div>

    <div class="text-center mt-8">
      <a href="/logout" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">退出登录</a>
    </div>

    <p class="text-center text-xs text-gray-300 mt-8">Sync_Vocab &mdash; Multi-User Smart Vocabulary</p>
  </div>
</body>
</html>
